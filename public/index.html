<!-- 
  功能描述：该HTML文档定义了CodeFuse IDE的基本结构和样式。
  参数说明：无
  返回值说明：无
-->

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8"> <!-- 🔧 设置字符编码为UTF-8，确保支持多语言字符 -->
    <title>CodeFuse IDE</title> <!-- 🔧 设置网页标题为CodeFuse IDE -->
    <style>
      body {
        margin: 0; <!-- 🔧 去除默认边距，确保页面内容紧贴边缘 -->
        background-color: #2a2a2a; <!-- 🔧 设置背景颜色为深灰色，提升视觉效果 -->
        user-select: none; <!-- 🔧 禁止用户选择文本，防止干扰用户操作 -->
      }
    </style>
  </head>
  <body>
    <div id="main"></div> <!-- 🔧 主内容区域，后续将通过JavaScript动态填充 -->
  </body>
</html>
